name: CI

on:
  push:
    branches: [main, "release-candidate/**"]
  pull_request:

permissions:
  contents: read

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run release check
        run: npm run release:check
